<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С днём матери!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="main">
                <div class="main__card">
                    <div class="main__title" id="title">С 8 марта!</div>
                    <div class="main__desc"><b>Дорогие мамы!</b> В этот чудесный день мы с особой теплотой хотим сказать вам огромное спасибо и признаться в нашей безмерной любви.</div>
                    <div class="main__btn-block">
                        <div class="main__button" id="openBtn">Тык</div>
                        <div class="main__hint">Рекомендуем прибавить громкость</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-window" id="modalWindow">
        <div class="modal__mess">
            <div class="modal__title">Поздравляем!</div>
            <div class="modal__text" id="modalText">Упс... Вы не должны видеть этот</div>
            <audio src="zhasmin-mamino-serdce.mp3" controls id="audio"></audio>
        </div>
    </div>

    <script src="script.js"></script>
